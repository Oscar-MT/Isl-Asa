<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Asamblea de Dios</title>
  </head>
  <body>
    <script>
      const { origin, pathname, search, hash } = window.location;
      const normalizedPath = pathname.replace(/\/+$/, "");
      const segments = normalizedPath.split("/");
      const repoName = segments.length > 1 ? segments[1] : "";
      const basePath = repoName ? `/${repoName}` : "";
      const routePath = normalizedPath.startsWith(basePath)
        ? normalizedPath.slice(basePath.length) || "/"
        : normalizedPath || "/";
      const params = new URLSearchParams();

      params.set("p", routePath);

      if (search.length > 1) {
        params.set("q", search.slice(1));
      }

      window.location.replace(`${origin}${basePath}/?${params.toString()}${hash}`);
    </script>
  </body>
</html>
